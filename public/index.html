<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>UniBridge</title>

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#f8fafc;
margin:0;
padding:40px 20px;
display:flex;
justify-content:center;
}
.container{max-width:420px;width:100%;}
.logo{font-weight:700;font-size:20px;margin-bottom:20px;color:#003366;}
.steps{display:flex;justify-content:space-between;margin-bottom:20px;font-size:12px;color:#9aa4af;}
.step{flex:1;text-align:center;}
.step.active{color:#00D4AA;font-weight:600;}
.card{border:1px solid #e5edf3;border-radius:14px;padding:24px;background:#ffffff;}
.summary{background:#f1f5f9;border-radius:10px;padding:12px;margin-bottom:15px;font-size:14px;display:none;}
.summary div{margin:6px 0;}
h2{margin-top:0;margin-bottom:20px;font-size:22px;color:#003366;}
h3{margin-top:18px;margin-bottom:8px;font-size:16px;color:#003366;}
input,select,button{width:100%;padding:14px;margin-top:10px;font-size:16px;border-radius:10px;box-sizing:border-box;}
input,select{border:1px solid #e5edf3;}
button{background:#00D4AA;color:#003366;border:none;cursor:pointer;font-weight:600;}
button:disabled{opacity:.5;cursor:not-allowed;}
#pixBox{display:none;margin-top:10px;}
#taxBox{display:none;}
#status{margin-top:18px;font-size:14px;color:#6b7280;}
.status-success{color:#00b894;font-weight:600;}
.status-error{color:#c62828;font-weight:600;}
.muted{font-size:12px;color:#6b7280;margin-top:8px;}
</style>

</head>

<body>

<div class="container">

<div class="logo">UniBridge</div>

<div class="steps">
<div id="step1" class="step active">Setup</div>
<div id="step2" class="step">Route</div>
<div id="step3" class="step">Payment</div>
<div id="step4" class="step">Processing</div>
<div id="step5" class="step">Done</div>
</div>

<div class="card">

<h2>Send money</h2>

<div id="summary" class="summary">
<div><strong>You pay</strong>: <span id="sumFunding"></span></div>
<div><strong>Recipient country</strong>: <span id="sumCountry"></span></div>
<div><strong>Route</strong>: <span id="sumRoute">PIX Instant</span></div>
</div>

<input id="amount" type="number" step="0.01" value="10"/>

<select id="source_country">
<option value="US">United States</option>
<option value="EU">Europe</option>
</select>

<select id="country">
<option value="BR">Brazil</option>
</select>

<button id="sendBtn">Get quote</button>

<div id="pixBox">

<h3>PIX key</h3>

<input id="pix" placeholder="Enter PIX key"/>

<div id="taxBox">
<input id="taxId" placeholder="CPF / CNPJ"/>
</div>

<button id="continueBtn">Continue to payment</button>

<div class="muted">PIX key is required.</div>

</div>

<div id="status"></div>

</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>

/* ================= TELEGRAM ================= */

const tg = window.Telegram?.WebApp
if(tg){ tg.expand() }

/* ================= CONTEXT ================= */

const host = window.location.hostname;
const pathName = window.location.pathname;

const isMainDomain =
  host === "unibrij.io" || host === "www.unibrij.io";

const isSurface =
  pathName === "/surface" || pathName.startsWith("/surface/");

const isTelegram = !!tg;

function isInteractiveSurface(){
  return isSurface || isTelegram;
}

/* ================= API BASE (HARD LOCK) ================= */

const API_BASE =
  isInteractiveSurface()
    ? (isMainDomain ? "/api" : "https://unibridge-v2-xxx.run.app")
    : null;

/* ================= API ================= */

async function api(endpoint, payload){

  if(!API_BASE){
    throw new Error("blocked_context");
  }

  const isProxy = API_BASE === "/api";
  const method = endpoint === "settlement/status" ? "GET" : "POST";

  let url = isProxy
    ? `/api?endpoint=${encodeURIComponent(endpoint)}`
    : `${API_BASE}/v2/${endpoint}`;

  if(method === "GET" && payload){
    const params = new URLSearchParams(payload).toString();
    if(params){
      url += isProxy ? `&${params}` : `?${params}`;
    }
  }

  const options = {
    method,
    headers:{ "content-type":"application/json" }
  };

  if(method === "POST"){
    options.body = JSON.stringify(payload || {});
  }

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 15000);

  let r;

  try{
    r = await fetch(url,{...options, signal: controller.signal});
  }catch(e){
    clearTimeout(timeout);
    throw new Error("network_error");
  }

  clearTimeout(timeout);

  const text = await r.text();

  let data;
  try{ data = JSON.parse(text) }catch{ data = {} }

  if(!r.ok){
    throw new Error(data.error || "api_error");
  }

  return data;
}

/* ================= UI ================= */

const sendBtn=document.getElementById("sendBtn")
const continueBtn=document.getElementById("continueBtn")
const statusBox=document.getElementById("status")
const summaryBox=document.getElementById("summary")
const pixBox=document.getElementById("pixBox")
const taxBox=document.getElementById("taxBox")

function setStep(n){
for(let i=1;i<=5;i++){
document.getElementById("step"+i).classList.remove("active")
}
document.getElementById("step"+n).classList.add("active")
}

function setStatus(msg,type){
statusBox.innerText=msg
statusBox.className=""
if(type==="success")statusBox.classList.add("status-success")
if(type==="error")statusBox.classList.add("status-error")
}

function formatAmount(v,s=""){
const n=Number(v)
if(!Number.isFinite(n)) return "-"
return `${n.toFixed(2)} ${s}`
}

function updateSummary(route){
document.getElementById("sumFunding").innerText =
formatAmount(route.funding_amount, route.asset || "USDT")
document.getElementById("sumCountry").innerText =
document.getElementById("country").value
document.getElementById("sumRoute").innerText =
`${(route.payout_rail || "PIX").toUpperCase()} Instant`
summaryBox.style.display="block"
}

/* ================= STATE ================= */

let sessionId=null
let routeId=null
let settlementId=null
let poller=null
let confirming=false

/* ================= FLOW ================= */

async function startFlow(){

if(!isInteractiveSurface()) return;

try{

sendBtn.disabled=true
pixBox.style.display="none"
summaryBox.style.display="none"
taxBox.style.display="none"

setStep(1)
setStatus("Registering...")

const amount=Number(document.getElementById("amount").value)
const country=document.getElementById("country").value
const source=document.getElementById("source_country").value

if(!amount || amount<=0){
throw new Error("invalid_amount")
}

const reg=await api("session/register",{source_country:source,receiver_country:country})
sessionId=reg.session_id

await api("session/resolve",{session_id:sessionId})

const quote=await api("session/quote",{session_id:sessionId,amount})

if(!quote.routes?.length){
throw new Error("no_routes")
}

const route=quote.routes[0]
routeId=route.route_id || route.id

updateSummary(route)

pixBox.style.display="block"
if(route.requires_tax_id) taxBox.style.display="block"

setStep(2)
setStatus("Enter PIX")

}catch(e){
setStatus(e.message,"error")
sendBtn.disabled=false
}
}

async function continueFlow(){

if(!isInteractiveSurface()) return;

try{

continueBtn.disabled=true

const pix=document.getElementById("pix").value.trim()
const tax_id=document.getElementById("taxId").value.trim()

if(!pix){
throw new Error("pix_required")
}

const destination = tax_id ? {pix,tax_id} : {pix}

const create=await api("settlement/create",{
session_id:sessionId,
route_id:routeId,
destination
})

settlementId=create.settlement_id
localStorage.setItem("ub_settlement", settlementId)

const funding=await api("funding/session",{settlement_id:settlementId})

setStep(3)
window.location.href=funding.widget_url

}catch(e){
setStatus(e.message,"error")
continueBtn.disabled=false
}
}

async function confirmSettlement(){

if(confirming || !settlementId) return;
confirming=true;

try{
setStep(4)
setStatus("Confirming payment...")

await api("settlement/confirm",{settlement_id:settlementId})

startPolling()

}catch(e){
setStatus("Waiting confirmation...")
startPolling()
confirming=false
}
}

function startPolling(){

if(!settlementId || poller) return;

poller=setInterval(async()=>{

try{

const data=await api("settlement/status",{settlement_id:settlementId})

if(data.status==="completed"){
clearInterval(poller)
setStep(5)
setStatus("Completed","success")
localStorage.removeItem("ub_settlement")
}

if(data.status==="failed"){
clearInterval(poller)
setStep(5)
setStatus("Failed","error")
localStorage.removeItem("ub_settlement")
}

}catch{}

},5000)

}

/* ================= RESUME ================= */

window.addEventListener("load",async()=>{

const saved=localStorage.getItem("ub_settlement")
if(!saved) return;

settlementId=saved
setStep(4)
setStatus("Resuming...")
startPolling()

})

window.addEventListener("focus",()=>{
if(settlementId && !poller && !confirming){
confirmSettlement()
}
})

/* ================= BIND ================= */

if(isInteractiveSurface()){
sendBtn.onclick=startFlow
continueBtn.onclick=continueFlow
}else{
sendBtn.disabled=true
continueBtn.disabled=true
setStatus("Open via surface")
}

</script>

</body>
</html>
