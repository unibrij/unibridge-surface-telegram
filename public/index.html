<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>UniBridge</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#ffffff;
margin:0;
padding:40px 20px;
display:flex;
justify-content:center;
}

.container{
max-width:420px;
width:100%;
}

.logo{
font-weight:700;
font-size:20px;
margin-bottom:20px;
}

.steps{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:12px;
color:#999;
}

.step{
flex:1;
text-align:center;
}

.step.active{
color:#111;
font-weight:600;
}

.card{
border:1px solid #eee;
border-radius:14px;
padding:24px;
}

.summary{
background:#f7f7f7;
border-radius:10px;
padding:12px;
margin-bottom:15px;
font-size:14px;
}

h2{
margin-top:0;
margin-bottom:20px;
font-size:22px;
}

input,select,button{
width:100%;
padding:14px;
margin-top:10px;
font-size:16px;
border-radius:10px;
}

input,select{
border:1px solid #ddd;
}

button{
background:#111;
color:white;
border:none;
cursor:pointer;
font-weight:600;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

#pixBox{
display:none;
margin-top:10px;
}

#status{
margin-top:18px;
font-size:14px;
color:#666;
}

.status-success{
color:#0a7d33;
font-weight:600;
}

.status-error{
color:#c62828;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
UniBridge
</div>

<div class="steps">
<div id="step1" class="step active">Setup</div>
<div id="step2" class="step">Route</div>
<div id="step3" class="step">Payment</div>
<div id="step4" class="step">Processing</div>
<div id="step5" class="step">Done</div>
</div>

<div class="card">

<h2>Send money</h2>

<div id="summary" class="summary" style="display:none">

<div><strong>You send</strong>: <span id="sumAmount"></span></div>
<div><strong>Recipient</strong>: <span id="sumCountry"></span></div>
<div><strong>Route</strong>: PIX Instant</div>

</div>

<input id="amount" type="number" placeholder="Amount" value="10"/>

<select id="source_country">
<option value="US">United States</option>
<option value="EU">Europe</option>
</select>

<select id="country">
<option value="BR">Brazil</option>
</select>

<button id="sendBtn">Send</button>

<div id="pixBox">

<h3>PIX key</h3>

<input id="pix" placeholder="Enter PIX key"/>

<button id="continueBtn">Continue</button>

</div>

<div id="status"></div>

</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>

const tg = window.Telegram?.WebApp
if(tg){ tg.expand() }

let sessionId=null
let routeId=null
let settlementId=null
let poller=null
let confirming=false

const sendBtn=document.getElementById("sendBtn")
const continueBtn=document.getElementById("continueBtn")
const statusBox=document.getElementById("status")

function setStep(n){

for(let i=1;i<=5;i++){
document.getElementById("step"+i).classList.remove("active")
}

document.getElementById("step"+n).classList.add("active")

}

function setStatus(msg,type){

statusBox.innerText=msg
statusBox.className=""

if(type==="success"){statusBox.classList.add("status-success")}
if(type==="error"){statusBox.classList.add("status-error")}

}

function updateSummary(){

const amount=document.getElementById("amount").value
const country=document.getElementById("country").value

document.getElementById("sumAmount").innerText=amount+" USD"
document.getElementById("sumCountry").innerText=country
document.getElementById("summary").style.display="block"

}

async function api(path,payload){

const r=await fetch("/api/proxy?endpoint="+path,{
method:"POST",
headers:{ "content-type":"application/json" },
body:JSON.stringify(payload)
})

const text=await r.text()

let data

try{
data=JSON.parse(text)
}catch{
return {}
}

if(!r.ok){
throw new Error(data.error || "api_error")
}

return data

}

/* REGISTER */

async function startFlow(){

try{

sendBtn.disabled=true

updateSummary()

setStep(1)

setStatus("Registering...")

const amount=Number(document.getElementById("amount").value)

if(!amount || amount<=0){
throw new Error("Invalid amount")
}

const country=document.getElementById("country").value
const source=document.getElementById("source_country").value

const reg=await api("session/register",{source_country:source,receiver_country:country})

sessionId=reg.session_id

setStatus("Resolving route...")

const resolve=await api("session/resolve",{session_id:sessionId})

const execution=resolve?.delivery_options?.execution

if(!execution?.pix){
throw new Error("PIX route unavailable")
}

setStep(2)

document.getElementById("pixBox").style.display="block"

document.getElementById("pix").focus()

setStatus("Enter PIX key")

}
catch(err){

console.error(err)
setStatus(err.message,"error")
sendBtn.disabled=false

}

}

/* QUOTE + CREATE */

async function continueFlow(){

try{

continueBtn.disabled=true

const pix=document.getElementById("pix").value.trim()

if(!pix){
throw new Error("PIX required")
}

const amount=Number(document.getElementById("amount").value)

setStatus("Getting quote...")

const quote=await api("session/quote",{session_id:sessionId,amount})

if(!quote.routes?.length){
throw new Error("No routes available")
}

routeId=quote.routes[0].route_id

setStatus("Creating settlement...")

const create=await api("settlement/create",{session_id:sessionId,route_id:routeId,destination:{pix}})

settlementId=create.settlement_id

localStorage.setItem("ub_settlement",settlementId)

setStatus("Redirecting to payment...")

const funding=await api("funding/session",{settlement_id:settlementId})

if(!funding.widget_url){
throw new Error("Ramp unavailable")
}

setStep(3)

window.location.href=funding.widget_url

}
catch(err){

console.error(err)
setStatus(err.message,"error")
continueBtn.disabled=false

}

}

/* CONFIRM PAYMENT */

async function confirmSettlement(){

if(confirming) return
confirming=true

try{

setStep(4)

setStatus("Confirming payment...")

await api("settlement/confirm",{settlement_id:settlementId})

setStep(5)

setStatus("Payment confirmed","success")

startPolling()

}
catch(err){

console.error(err)

setStatus("Confirm failed","error")

}

}

/* BACKGROUND POLLING */

function startPolling(){

if(!settlementId) return
if(poller) return

poller=setInterval(async ()=>{

try{

const r=await fetch("/api/proxy?endpoint=settlement/status&settlement_id="+settlementId)

let data

try{
data=await r.json()
}catch{
data={}
}

if(data.status==="completed" || data.status==="failed"){

clearInterval(poller)
poller=null

localStorage.removeItem("ub_settlement")
settlementId=null

}

}
catch(e){
console.error(e)
}

},5000)

}

/* RESUME AFTER REFRESH */

window.addEventListener("load",()=>{

statusBox.innerText=""
statusBox.className=""

const saved=localStorage.getItem("ub_settlement")

if(saved){

settlementId=saved

setStep(4)

confirmSettlement()

}

})

/* RETURN FROM PAYMENT */

window.addEventListener("focus",()=>{

if(!settlementId) return
if(poller) return

confirmSettlement()

})

sendBtn.onclick=startFlow
continueBtn.onclick=continueFlow

</script>

</body>
</html>
